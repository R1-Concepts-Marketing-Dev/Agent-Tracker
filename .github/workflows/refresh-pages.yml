name: Refresh Agent Pages

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-anthropic
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh agent pages (no Claude, no email)
        env:
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_GIDS:        ${{ secrets.SHEET_GIDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          REFRESH_ONLY: "true"
        run: python scripts/generate_report.py

      - name: Commit updated pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/index.html docs/agents/
          git diff --staged --quiet || git commit -m "chore: refresh agent pages [skip ci]"
          git push

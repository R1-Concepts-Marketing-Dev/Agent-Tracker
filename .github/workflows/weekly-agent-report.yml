name: Weekly Agent Pipeline Report

on:
  # Every Friday at 12:00 PM PST (20:00 UTC)
  schedule:
    - cron: '0 20 * * 5'

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-anthropic
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # 5. Run the report generator
      - name: Generate and send weekly report
        env:
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_GIDS:         ${{ secrets.SHEET_GIDS }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/generate_report.py

      # 6. Commit the updated HTML report for GitHub Pages
      - name: Publish report to GitHub Pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update report [skip ci]"
          git push

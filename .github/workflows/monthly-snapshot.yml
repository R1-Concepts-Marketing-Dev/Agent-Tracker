name: Monthly Time-Saved Snapshot

on:
  # 1st of every month at 00:30 UTC — records previous month's final total
  schedule:
    - cron: '30 0 1 * *'

  # Allow manual trigger (e.g. to backfill a missed month)
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-anthropic
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Record monthly time-saved snapshot
        env:
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_GIDS:                  ${{ secrets.SHEET_GIDS }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MONTHLY_SNAPSHOT: "true"
        run: python scripts/generate_report.py

      - name: Commit updated cache
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/workflow_cache.json
          git diff --staged --quiet || git commit -m "chore: record monthly time-saved snapshot [skip ci]"
          git pull --rebase origin main
          git push
